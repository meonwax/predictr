[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# `sqlalchemy.url` intentionally empty: env.py reads it from app.config.Settings
# (which sources DATABASE_URL from the environment or a .env file).
sqlalchemy.url =

# Use a sortable revision id like "0001_initial".
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
# (No autoformat hook configured.)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
